<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolVelo Adventure - Dashboard Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0284c7;
      --text-dark: #1f2937;
      --bg-light: #f3f4f6;
    }
    body { font-family: 'Poppins','Cairo',sans-serif; margin:0; background:var(--bg-light); color:var(--text-dark); }
    .rtl-mode { direction: rtl; font-family: 'Cairo',sans-serif; }
    .container { max-width:800px; margin:2rem auto; padding:1rem; }
    .card { background:white; padding:1.5rem; border-radius:12px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom:2rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; margin-bottom:0.5rem; font-weight:600; }
    input,textarea,select { width:100%; padding:0.75rem; border:1px solid #d1d5db; border-radius:8px; box-sizing:border-box; }
    button { background:var(--primary-color); color:white; border:none; padding:0.75rem 1.5rem; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; transition:opacity 0.3s; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .review-card { border-bottom:1px solid #eee; padding:1rem 0; animation:fadeIn 0.5s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .lang-switcher { display:flex; gap:10px; margin-bottom:1rem; justify-content:flex-end; }
    .lang-btn { width:auto; background:#e5e7eb; color:#374151; padding:0.5rem 1rem; }
    .btn-purge { background:#f97316; margin-top:10px; }
    img.review-photo { max-width:100%; border-radius:8px; margin-top:8px; }
  </style>
</head>
<body>

<div class="container">
  <!-- أزرار تغيير اللغة -->
  <div class="lang-switcher">
    <button class="lang-btn" onclick="updateAppLanguage('ar')">العربية</button>
    <button class="lang-btn" onclick="updateAppLanguage('fr')">Français</button>
  </div>

  <!-- فورم التعليقات -->
  <div class="card">
    <h2 id="form-title">Laissez un avis</h2>
    <form id="review-form">
      <div class="form-group">
        <label for="u-name" id="lbl-name">Nom Complet</label>
        <input type="text" id="u-name" name="name" required minlength="3">
      </div>
      <div class="form-group">
        <label for="u-comment" id="lbl-comment">Votre Message</label>
        <textarea id="u-comment" name="comment" rows="3" required minlength="5"></textarea>
      </div>
      <div class="form-group">
        <label for="u-photo">Photo (optionnelle)</label>
        <input type="file" id="u-photo" accept="image/*">
      </div>
      <button type="submit" id="btn-submit">Envoyer l'avis</button>
    </form>
    <button class="btn-purge" onclick="purgeReviews()">تنقية التعليقات المسيئة</button>
  </div>

  <!-- عرض النتائج -->
  <div class="card">
    <h2 id="list-title">Avis des clients</h2>
    <div id="reviews-list"></div>
  </div>
</div>

<script>
const uiStrings = {
  ar:{formTitle:"اترك تعليقاً",listTitle:"آراء الزبناء",lblName:"الاسم الكامل",lblComment:"رسالتك",btnSubmit:"إرسال التعليق",success:"تم الإرسال بنجاح!"},
  fr:{formTitle:"Laissez un avis",listTitle:"Avis des clients",lblName:"Nom Complet",lblComment:"Votre Message",btnSubmit:"Envoyer l'avis",success:"Envoyé avec succès !"}
};

function updateAppLanguage(lang){
  const isRTL=(lang==='ar');
  document.documentElement.lang=lang;
  document.documentElement.dir=isRTL?'rtl':'ltr';
  document.body.className=isRTL?'rtl-mode':'';
  const strings=uiStrings[lang];
  document.getElementById('form-title').textContent=strings.formTitle;
  document.getElementById('list-title').textContent=strings.listTitle;
  document.getElementById('lbl-name').textContent=strings.lblName;
  document.getElementById('lbl-comment').textContent=strings.lblComment;
  document.getElementById('btn-submit').textContent=strings.btnSubmit;
  localStorage.setItem('solvelo_lang',lang);
}

// فلتر الكلمات المسيئة
const badWords=["خرا","حمار","fuck","shit","merde"];
function containsBadWords(text){return badWords.some(w=>text.toLowerCase().includes(w));}

function handleFormSubmit(e){
  e.preventDefault();
  const btn=document.getElementById('btn-submit');
  const name=document.getElementById('u-name').value;
  const comment=document.getElementById('u-comment').value;
  const photoInput=document.getElementById('u-photo');
  if(containsBadWords(name)||containsBadWords(comment)){
    alert("🚫 التعليق فيه كلمات مسيئة وما غاديش يتسجّل.");
    return;
  }
  btn.disabled=true;
  const data={name,comment,date:new Date().toLocaleDateString()};
  if(photoInput.files[0]){
    const reader=new FileReader();
    reader.onload=ev=>{data.photo=ev.target.result; addReviewToDOM(data);};
    reader.readAsDataURL(photoInput.files[0]);
  }else{addReviewToDOM(data);}
  alert(uiStrings[document.documentElement.lang].success);
  e.target.reset();
  btn.disabled=false;
}

function addReviewToDOM(review){
  const list=document.getElementById('reviews-list');
  const card=document.createElement('div');
  card.className='review-card';
  const header=document.createElement('strong'); header.textContent=review.name;
  const body=document.createElement('p'); body.textContent=review.comment;
  const date=document.createElement('small'); date.textContent=review.date; date.style.color="#9ca3af";
  card.append(header,body,date);
  if(review.photo){
    const img=document.createElement('img');
    img.src=review.photo;
    img.className='review-photo
